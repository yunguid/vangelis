name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/deploy.yml'
      - 'sound-engine/frontend/**'
      - 'sound-engine/audio-engine/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sound-engine/frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build audio engine WASM package
        run: |
          cd sound-engine/audio-engine
          wasm-pack build --target web --out-dir ../frontend/public/pkg

      - name: Install frontend dependencies
        run: |
          cd sound-engine/frontend
          npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Sync starter sound assets
        run: |
          cd sound-engine/frontend
          npm run sync:starter-sounds -- --force --quiet
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build frontend
        run: |
          cd sound-engine/frontend
          npm run build
        env:
          GITHUB_PAGES: true

      - name: Verify bundled static assets
        run: |
          test -f sound-engine/frontend/dist/pkg/sound_engine.js
          test -f sound-engine/frontend/dist/pkg/sound_engine_bg.wasm
          test -f sound-engine/frontend/dist/midi/rachmaninoff-concerto2-mov1.mid
          test -f sound-engine/frontend/dist/midi/satie-gymnopedie-1.mid
          test -f sound-engine/frontend/dist/midi/russian/stanchinsky-prelude-c-minor.mid
          test -f sound-engine/frontend/dist/samples/rachmaninoff/cello-c2.wav
          test -f sound-engine/frontend/dist/samples/starter-pack/piano/UR1_C4_mf_RR1.wav

      - name: Add .nojekyll to build output
        run: |
          touch sound-engine/frontend/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sound-engine/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
